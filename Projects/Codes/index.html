<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMM Target</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000; /* Match destination theme if known */
        }

        .iframe-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Protection Overlay (Optional - can block interaction if too high) */
        .glass-shield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            pointer-events: none; /* Allows clicks to pass through to iframe */
        }

        /* Loading Spinner */
        #loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- Loading State -->
    <div id="loader">
        <div class="spinner"></div>
        <p class="text-white mt-4 font-sans text-sm tracking-widest uppercase">Connecting...</p>
    </div>

    <!-- The Shield (Interception Layer) -->
    <div class="glass-shield"></div>

    <!-- The Content -->
    <div class="iframe-container">
        <iframe 
            id="main-frame"
            src="https://smm.axtarget.xyz/test30.html" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
        </iframe>
    </div>

    <script>
        // Disable Right Click Globally
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        }, false);

        // Disable Common Developer Shortcuts
        document.addEventListener('keydown', function(e) {
            // F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U
            if (
                e.keyCode === 123 || 
                (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) ||
                (e.ctrlKey && e.keyCode === 85)
            ) {
                e.preventDefault();
            }
        });

        // Handle Iframe Load
        const iframe = document.getElementById('main-frame');
        const loader = document.getElementById('loader');

        iframe.onload = function() {
            // Smoothly hide loader once site is ready
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.style.display = 'none';
            }, 500);
        };

        // Anti-Frame Breakout (Optional: uncomment if you want to force it to stay in iframe)
        /*
        window.onbeforeunload = function() {
            return "Are you sure you want to leave?";
        };
        */
    </script>
</body>
</html>
