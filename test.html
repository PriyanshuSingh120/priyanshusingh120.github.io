<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Star Sports Live | Premium Stream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --brand-green: #00ff6a;
            --brand-bg: #050505;
        }
        body {
            background-color: var(--brand-bg);
            color: white;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glow-green {
            box-shadow: 0 0 15px rgba(0, 255, 106, 0.3);
        }
        .stream-wrapper {
            aspect-ratio: 16 / 9;
            width: 100%;
            max-width: 1100px;
            position: relative;
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 12px;
        }
        .live-dot {
            width: 8px;
            height: 8px;
            background: #ff0000;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }
        /* Mobile height fix */
        @media (max-width: 768px) {
            .main-container {
                height: 100dvh;
            }
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 md:p-8">

    <div class="main-container w-full max-w-6xl flex flex-col gap-6">
        
        <!-- Header Section -->
        <header class="flex items-center justify-between px-2">
            <div class="flex items-center gap-3">
                <div class="bg-white/10 p-2 rounded-lg">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-[#00ff6a]"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                </div>
                <div>
                    <h1 class="text-lg font-bold tracking-tight">Star Sports 1 <span class="text-[#00ff6a] text-sm ml-2">HD Hindi</span></h1>
                    <div class="flex items-center text-[10px] text-white/50 uppercase tracking-widest">
                        <span class="live-dot"></span> LIVE BROADCAST
                    </div>
                </div>
            </div>
            
            <div class="flex gap-2">
                <button onclick="toggleFullScreen()" class="glass p-2 rounded-full hover:bg-white/10 transition-colors" title="Fullscreen">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
                </button>
            </div>
        </header>

        <!-- Player Container -->
        <main class="relative group">
            <div class="stream-wrapper mx-auto rounded-xl overflow-hidden border border-white/10 shadow-2xl bg-black">
                <!-- Video Stream -->
                <iframe 
                    id="stream-player"
                    src="https://allrounder-live.pages.dev/star/star-1-hindi" 
                    allow="autoplay; encrypted-media; fullscreen; picture-in-picture" 
                    allowfullscreen="true">
                </iframe>
                
                <!-- Custom Overlay (appears on hover) -->
                <div class="absolute inset-0 pointer-events-none flex flex-col justify-between p-6 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                    <div class="flex justify-end">
                        <span class="glass px-3 py-1 rounded-full text-xs font-medium">1080p Auto</span>
                    </div>
                </div>
            </div>
            
            <!-- Quick Actions Bar -->
            <div class="mt-6 glass rounded-2xl p-4 flex flex-wrap items-center justify-between gap-4">
                <div class="flex items-center gap-6">
                    <div class="flex flex-col">
                        <span class="text-xs text-white/40 uppercase font-bold">Latency</span>
                        <span class="text-sm font-mono text-[#00ff6a]">~1.2s</span>
                    </div>
                    <div class="flex flex-col">
                        <span class="text-xs text-white/40 uppercase font-bold">Viewers</span>
                        <span class="text-sm font-mono" id="viewer-count">14.2k</span>
                    </div>
                </div>
                
                <div class="flex items-center gap-2">
                    <button onclick="copyLink()" class="flex items-center gap-2 bg-[#00ff6a] text-black px-5 py-2 rounded-xl font-bold text-sm hover:scale-105 active:scale-95 transition-all shadow-lg glow-green">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                        Share Stream
                    </button>
                    <button onclick="refreshStream()" class="glass p-2.5 rounded-xl hover:bg-white/10 transition-colors">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"></path><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
                    </button>
                </div>
            </div>
        </main>

        <!-- Footer / Notice -->
        <footer class="text-center">
            <p class="text-[10px] text-white/20 uppercase tracking-widest leading-relaxed">
                Premium Streaming Experience &bull; Optimized for Mobile & Desktop<br>
                High Bandwidth Required for HD Playback
            </p>
        </footer>
    </div>

    <!-- Feedback Toast -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 glass px-6 py-3 rounded-2xl text-sm font-medium opacity-0 translate-y-4 transition-all pointer-events-none">
        Link copied to clipboard!
    </div>

    <script>
        // Disable common DevTools shortcuts
        document.onkeydown = (e) => {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) {
                return false;
            }
        };

        // Fullscreen Toggle
        function toggleFullScreen() {
            const elem = document.documentElement;
            if (!document.fullscreenElement) {
                elem.requestFullscreen().catch(err => {
                    console.error(`Error attempting to enable full-screen mode: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // Refresh Logic
        function refreshStream() {
            const iframe = document.getElementById('stream-player');
            const currentSrc = iframe.src;
            iframe.src = '';
            setTimeout(() => {
                iframe.src = currentSrc;
                showToast("Stream Reloaded");
            }, 100);
        }

        // Copy Sharing Link
        function copyLink() {
            const dummy = document.createElement('input');
            document.body.appendChild(dummy);
            dummy.value = window.location.href;
            dummy.select();
            document.execCommand('copy');
            document.body.removeChild(dummy);
            showToast("Share link copied!");
        }

        // Toast Helper
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.remove('opacity-0', 'translate-y-4');
            toast.classList.add('opacity-100', 'translate-y-0');
            
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-4');
                toast.classList.remove('opacity-100', 'translate-y-0');
            }, 3000);
        }

        // Simulate real-time viewer fluctuations
        setInterval(() => {
            const count = (14.2 + (Math.random() * 0.5)).toFixed(1);
            document.getElementById('viewer-count').textContent = count + 'k';
        }, 5000);
    </script>
</body>
</html>
