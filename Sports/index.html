<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Star Sports Live | Powered by Prigames</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --p: #00ff6a; --b: #050505; }
        body { 
            background: var(--b); 
            color: #fff; 
            font-family: system-ui, -apple-system, sans-serif; 
            overflow-x: hidden;
            overscroll-behavior: none;
        }
        .video-wrapper {
            width: 100%;
            max-width: 1000px;
            aspect-ratio: 16/9;
            background: #000;
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.1);
        }
        iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }
        .live-tag {
            background: #ff0000;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-4xl flex flex-col gap-4">
        
        <!-- Header -->
        <div class="flex items-center justify-between w-full px-1">
            <div class="flex flex-col">
                <h1 class="text-xl font-black italic tracking-tighter uppercase">Star Sports <span class="text-[#00ff6a]">1 Hindi</span></h1>
                <div class="flex items-center gap-2">
                    <span class="live-tag">LIVE</span>
                    <span class="text-[10px] text-white/40 uppercase tracking-widest font-bold">Ultra HD Experience</span>
                </div>
            </div>
            <button onclick="toggleFS()" class="bg-white/5 p-2.5 rounded-xl border border-white/10 hover:bg-white/10 transition-all">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
            </button>
        </div>

        <!-- Player Container -->
        <div class="video-wrapper">
            <iframe 
                id="stream"
                src="https://allrounder-live.pages.dev/star/star-1-hindi" 
                allow="autoplay; encrypted-media; fullscreen" 
                allowfullscreen="true"
                scrolling="no">
            </iframe>
        </div>

        <!-- Footer Actions -->
        <div class="flex flex-col gap-3 w-full">
            <div class="flex flex-col sm:flex-row gap-3">
                <a href="https://t.me/prigames" target="_blank" class="w-full sm:flex-1 bg-sky-500 text-white h-12 rounded-xl font-bold uppercase text-xs flex items-center justify-center gap-2 hover:brightness-110 active:scale-95 transition-all shadow-lg shadow-sky-500/20">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-.12.02-1.96 1.25-5.54 3.69-.52.35-1 .53-1.42.52-.47-.01-1.37-.26-2.03-.48-.82-.27-1.47-.42-1.42-.88.03-.24.35-.49.96-.75 3.78-1.65 6.31-2.74 7.58-3.27 3.61-1.5 4.35-1.76 4.84-1.77.11 0 .35.03.51.16.13.11.17.26.18.37 0 .04 0 .09-.01.13z"/></svg>
                    Join Telegram Channel
                </a>
                
                <button onclick="shareStream()" class="w-full sm:flex-1 bg-[#00ff6a] text-black h-12 rounded-xl font-black uppercase text-xs flex items-center justify-center gap-2 hover:brightness-110 active:scale-95 transition-all shadow-lg shadow-[#00ff6a]/20">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8M16 6l-4-4-4 4M12 2v13"/></svg>
                    Share
                </button>
            </div>

            <div class="glass p-4 rounded-xl flex items-center justify-between">
                <div class="flex flex-col">
                    <span class="text-[10px] text-white/30 uppercase font-bold tracking-widest">Copyright</span>
                    <span class="text-sm font-bold text-white/80">© Prigames</span>
                </div>
                <button onclick="refresh()" class="bg-white/5 p-2 rounded-lg border border-white/10 hover:bg-white/20 transition-all">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-10 bg-white text-black px-8 py-3 rounded-full text-xs font-bold uppercase tracking-widest opacity-0 translate-y-4 transition-all z-[999]">
        Link Copied
    </div>

    <script>
        // Native Share + Clipboard Fallback
        async function shareStream() {
            const data = {
                title: 'Star Sports 1 Live',
                text: 'Join me watching Star Sports 1 Hindi HD Live by Prigames!',
                url: window.location.href
            };

            try {
                if (navigator.share) {
                    await navigator.share(data);
                } else {
                    const temp = document.createElement('input');
                    document.body.appendChild(temp);
                    temp.value = window.location.href;
                    temp.select();
                    document.execCommand('copy');
                    document.body.removeChild(temp);
                    showToast("Link Copied!");
                }
            } catch (e) {
                showToast("Failed to share");
            }
        }

        function refresh() {
            const frame = document.getElementById('stream');
            const src = frame.src;
            frame.src = '';
            setTimeout(() => { frame.src = src; }, 50);
            showToast("Reloading Stream...");
        }

        function toggleFS() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.remove('opacity-0', 'translate-y-4');
            t.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                t.classList.add('opacity-0', 'translate-y-4');
                t.classList.remove('opacity-100', 'translate-y-0');
            }, 2000);
        }

        // Standard protection
        document.onkeydown = (e) => {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) return false;
        };
    </script>
</body>
</html>
